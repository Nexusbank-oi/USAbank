<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vantage Peak - Transfers & Payments</title>
    <style>
        :root { --primary: #0f172a; --accent: #fbbf24; --bg: #f8fafc; --glass: rgba(255, 255, 255, 0.9); }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: #1e293b; }
        
        /* Sidebar */
        nav { width: 260px; background: var(--primary); color: white; padding: 30px 20px; display: flex; flex-direction: column; }
        .profile-area { text-align: center; margin-bottom: 40px; }
        .profile-img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--accent); margin-bottom: 10px; }
        nav h2 { color: var(--accent); font-size: 1.2rem; text-align: center; letter-spacing: 1px; margin-bottom: 40px; }
        nav a { color: #94a3b8; text-decoration: none; padding: 12px; border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: 0.2s; }
        nav a:hover { background: #1e293b; color: white; border-left: 4px solid var(--accent); }

        /* Main Content */
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .tabs { display: flex; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid #e2e8f0; }
        .tab { padding: 12px 24px; cursor: pointer; font-weight: 600; color: #64748b; border-bottom: 2px solid transparent; }
        .tab.active { color: var(--primary); border-bottom: 2px solid var(--accent); }

        /* Forms */
        .transfer-card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); max-width: 600px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; color: #475569; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 0.95rem; }
        
        .btn-primary { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-primary:hover { background: #1e293b; opacity: 0.9; }

        /* Overlays */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal { background: white; padding: 40px; border-radius: 20px; text-align: center; max-width: 400px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .hidden { display: none; }
    </style>
</head>
<body>
    <!-- Process Overlays -->
    <div id="loading-overlay" class="overlay">
        <div class="modal"><div class="loader"></div><p id="status-text">Verifying Security Protocols...</p></div>
    </div>

    <nav>
        <div class="profile-area">
            <img src="profile.jpg" alt="Profile" class="profile-img" onerror="this.src='https://ui-avatars.com'">
            <div style="font-weight:600;">hyun Jéssica</div>
        </div>
        <h2>Vantage Peak</h2>
        <a onclick="location.href='dashboard.html'">Dashboard</a>
        <a onclick="location.href='transfer.html'">Transfer</a>
        <a onclick="location.href='settings.html'">Settings</a>
    </nav>

    <div class="main">
        <h1>Transfers & Payments</h1>
        <div class="tabs">
            <div class="tab active" onclick="showTab('local')">Domestic (USA)</div>
            <div class="tab" onclick="showTab('international')">International</div>
            <div class="tab" onclick="showTab('bills')">Bill Pay</div>
        </div>

        <!-- LOCAL TRANSFER -->
        <div id="local-section" class="transfer-card">
            <h3>Domestic Wire / ACH</h3>
            <div class="form-group">
                <label>Select Recipient Bank</label>
                <select id="local-bank">
                    <option>JPMorgan Chase</option><option>Bank of America</option>
                    <option>Citigroup</option><option>Wells Fargo</option>
                    <option>Goldman Sachs</option><option>Morgan Stanley</option>
                    <option>U.S. Bancorp</option><option>PNC Financial Services</option>
                    <option>Truist Financial</option><option>Charles Schwab</option>
                    <option>TD Bank</option><option>Capital One</option>
                    <option>BNY Mellon</option><option>State Street</option>
                    <option>American Express</option>
                </select>
            </div>
            <div class="form-group"><label>Account Number</label><input type="text" placeholder="0000000000"></div>
            <div class="form-group"><label>Routing Number (9 Digits)</label><input type="text" placeholder="Routing number"></div>
            <div class="form-group"><label>Amount ($)</label><input type="number" placeholder="0.00"></div>
            <button class="btn-primary" onclick="processLocal()">Send Money</button>
        </div>

        <!-- INTERNATIONAL TRANSFER -->
        <div id="international-section" class="transfer-card hidden">
            <h3>Global Swift Transfer</h3>
            <div class="form-group"><label>Beneficiary Full Name</label><input type="text" placeholder="Legal name"></div>
            <div class="form-group"><label>Recipient Bank Name</label><input type="text" placeholder="Full bank name"></div>
            <div class="form-group"><label>Swift / BIC Code (Optional)</label><input type="text" placeholder="ABCD US 33"></div>
            <div class="form-group"><label>IBAN / Account Number</label><input type="text" placeholder="International account number"></div>
            
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex:2;"><label>Amount</label><input type="number" placeholder="0.00"></div>
                <div class="form-group" style="flex:1;">
                    <label>Currency</label>
                    <select>
                        <option>PLN (Poland)</option><option>SGD (Singapore)</option>
                        <option>TWD (Taiwan)</option><option>USD</option>
                        <option>EUR</option><option>GBP</option>
                        <option>JPY</option><option>CAD</option>
                        <option>AUD</option><option>CHF</option>
                        <option>CNY</option><option>HKD</option>
                        <option>NZD</option><option>SEK</option>
                        <option>ZAR</option>
                    </select>
                </div>
            </div>
            <button class="btn-primary" onclick="processInternational()">Initiate Global Transfer</button>
        </div>

        <!-- BILL PAY -->
        <div id="bills-section" class="transfer-card hidden">
            <h3>Pay Bills</h3>
            <div class="form-group"><label>Payee Name</label><input type="text" placeholder="e.g. AT&T, Utility Co."></div>
            <div class="form-group"><label>Account Number</label><input type="text" placeholder="Bill account number"></div>
            <button class="btn-primary" onclick="processLocal()">Pay Bill</button>
        </div>
    </div>

    <script>
        function showTab(type) {
            document.querySelectorAll('.transfer-card').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(type + '-section').classList.remove('hidden');
            event.currentTarget.classList.add('active');
        }

        function processLocal() {
            const overlay = document.getElementById('loading-overlay');
            overlay.style.display = 'flex';
            setTimeout(() => {
                overlay.style.display = 'none';
                alert("Transaction Error: You can't perform this right now. Please try again later or contact your account officer.");
            }, 4000);
        }

        function processInternational() {
            const overlay = document.getElementById('loading-overlay');
            overlay.style.display = 'flex';
            setTimeout(() => {
                overlay.innerHTML = `
                    <div class="modal">
                        <h2 style="color:#e74c3c;">Payment On Hold</h2>
                        <p>To finalize this international transfer, a mandatory <b>1.8% processing fee</b> must be paid from the <b>receiver country's</b> localized tax account.</p>
                        <hr>
                        <p>Please contact the bank staff for the designated fee payment address:</p>
                        <h3 style="background:#f1f5f9; padding:10px; border-radius:5px;">+1 (368) 207-0226</h3>
                        <p style="font-size:0.8rem; color:#64748b;">(Chat with support on WhatsApp for instant clearance)</p>
                        <button class="btn-primary" onclick="location.reload()">Close</button>
                    </div>
                `;
            }, 4000);
        }
    </script>
</body>
</html>
